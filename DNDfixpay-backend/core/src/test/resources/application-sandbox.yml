spring:
  datasource:
    url: jdbc:h2:mem:sandbox_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6380
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/sandbox-realm-unused

fixpay:
  vtpass:
    base-url: ${VTPASS_BASE_URL:https://sandbox.vtpass.com}
    api-key: ${VTPASS_API_KEY:}
    secret-key: ${VTPASS_SECRET_KEY:}
    webhook-secret: ${VTPASS_WEBHOOK_SECRET:dev_vtpass_webhook_secret}
  events:
    enabled: false
  verification:
    provider: mock
