server:
  port: 8081

spring:
  application:
    name: fixpay-core

  datasource:
    url:      jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:fixpay}
    username: ${DB_USER:fixpay}
    password: ${DB_PASSWORD:fixpay_dev_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host:     ${VALKEY_HOST:localhost}
      port:     ${VALKEY_PORT:6380}
      password: ${VALKEY_PASSWORD:valkey_dev_secret}

  mail:
    host:     ${MAIL_HOST:localhost}
    port:     ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth:            false
      mail.smtp.starttls.enable: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KC_URL:http://localhost:8180}/realms/${KC_REALM:customers}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

fixpay:
  mail:
    from: ${MAIL_FROM:noreply@fixpay.local}
  keycloak:
    url:           ${KC_URL:http://localhost:8180}
    realm:         ${KC_REALM:customers}
    admin-realm:   master
    admin-client:  admin-cli
    admin-user:    ${KC_ADMIN_USER:admin}
    admin-password: ${KC_ADMIN_PASSWORD:admin_dev_secret}
    tenant-realm:  ${KC_TENANT_REALM:tenants}
    tenant-app-client: ${KC_TENANT_APP_CLIENT:fixpay-tenant-portal}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  events:
    enabled: ${FIXPAY_EVENTS_ENABLED:false}
  verification:
    provider: ${VERIFICATION_PROVIDER:mock}
    report-base-url: ${VERIFICATION_REPORT_BASE_URL:https://reports.fixpay.local/kyc}
    bvn:
      enabled: ${VERIFICATION_BVN_ENABLED:false}
      base-url: ${VERIFICATION_BVN_BASE_URL:https://api.bvn-provider.local}
      api-key: ${VERIFICATION_BVN_API_KEY:}
    nin:
      enabled: ${VERIFICATION_NIN_ENABLED:false}
      base-url: ${VERIFICATION_NIN_BASE_URL:https://api.nin-provider.local}
      api-key: ${VERIFICATION_NIN_API_KEY:}
    cac:
      enabled: ${VERIFICATION_CAC_ENABLED:false}
      base-url: ${VERIFICATION_CAC_BASE_URL:https://api.cac-provider.local}
      api-key: ${VERIFICATION_CAC_API_KEY:}
  vtpass:
    base-url: ${VTPASS_BASE_URL:https://sandbox.vtpass.com}
    api-key: ${VTPASS_API_KEY:7a1593b111e836697ac1a122367c5ca2}
    secret-key: ${VTPASS_SECRET_KEY:SK_650580adb1b7a0da2e430bd4316c5ba9224a9dcb66c}
    webhook-secret: ${VTPASS_WEBHOOK_SECRET:dev_vtpass_webhook_secret}
  paystack:
    base-url: ${PAYSTACK_BASE_URL:https://api.paystack.co}
    secret-key: ${PAYSTACK_SECRET_KEY:sk_test_placeholder}
  mandate:
    provider: ${MANDATE_PROVIDER:nibss-npsm}
    enabled: ${MANDATE_PROVIDER_ENABLED:false}
    base-url: ${MANDATE_BASE_URL:https://sandbox.nibss.local}
    api-key: ${MANDATE_API_KEY:}
    secret-key: ${MANDATE_SECRET_KEY:}
  payment:
    # Hard timeout for pending payments. Any payment that stays in a non-terminal status beyond
    # this threshold is permanently failed by the scheduler. Platform admins can adjust this at
    # runtime via PUT /api/admin/settings/payment-timeout (range 1–3600s).
    timeout-seconds: ${PAYMENT_TIMEOUT_SECONDS:60}
    # How often the timeout scanner runs (milliseconds). Adjust lower for tighter deadline
    # enforcement at the cost of slightly more DB reads.
    timeout-check-interval-ms: ${PAYMENT_TIMEOUT_CHECK_INTERVAL_MS:10000}

  # Payment rail: circuit breaker defaults (all overridable per-processor via config_json)
  rail:
    cb:
      failure-rate-threshold: ${RAIL_CB_FAILURE_RATE:50}       # % failures to open circuit
      sliding-window-size:    ${RAIL_CB_WINDOW_SIZE:10}         # number of calls in window
      wait-duration-seconds:  ${RAIL_CB_WAIT_SECONDS:60}        # seconds to stay open before half-open
      min-calls:              ${RAIL_CB_MIN_CALLS:5}            # min calls before CB activates

# PF4J hot-loadable processor plugins
pf4j:
  plugins-dir: ${FIXPAY_PLUGINS_DIR:./plugins}

logging:
  level:
    ng.fixpay: DEBUG
    org.hibernate.SQL: DEBUG
