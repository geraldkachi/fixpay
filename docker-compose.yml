version: '3.8'

services:
  # Database Container
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fixpay
      POSTGRES_USER: fixpayuser
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Backend PHP-FPM Container
  backend:
    build:
      context: ./fixpay-laravel
      dockerfile: Dockerfile
    volumes:
      - ./fixpay-laravel:/var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fixpay
      DB_USERNAME: fixpayuser
      DB_PASSWORD: secretpassword
    depends_on:
      - db
    restart: unless-stopped

  # Backend Web Server (Nginx) to serve Laravel API
  api_webserver:
    image: nginx:alpine
    volumes:
      - ./fixpay-laravel:/var/www
      - ./nginx-backend.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Frontend Web Server (PWA)
  frontend:
    build:
      context: ./fixpay-pwa
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  db_data:
