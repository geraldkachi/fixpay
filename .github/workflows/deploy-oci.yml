name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    name: Test and Build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, pdo_pgsql, bcmath

      - name: Install Backend Dependencies
        working-directory: ./fixpay-laravel
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Backend Tests
        working-directory: ./fixpay-laravel
        run: php artisan test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./fixpay-pwa
        run: npm ci

      - name: Build Frontend (PWA)
        working-directory: ./fixpay-pwa
        run: npm run build

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-dist
          path: fixpay-pwa/dist

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    name: Deploy to OCI
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Built PWA
        uses: actions/download-artifact@v4
        with:
          name: pwa-dist
          path: fixpay-pwa/dist

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.yml,nginx-backend.conf,fixpay-laravel,fixpay-pwa"
          target: "/var/www/fixpay"
          rm: true # Clean target directory before copying
          exclude: "fixpay-laravel/vendor,fixpay-pwa/node_modules"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /var/www/fixpay
            docker compose up -d --build
            docker image prune -f
