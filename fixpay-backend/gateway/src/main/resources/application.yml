server:
  port: 8080

spring:
  application:
    name: fixpay-gateway
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Powered-By, FixPay-Gateway
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: [ "GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS" ]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: analytics
          uri: http://${ANALYTICS_HOST:localhost}:8083
          predicates:
            - Path=/api/analytics/**
        - id: compliance
          uri: http://${COMPLIANCE_HOST:localhost}:8082
          predicates:
            - Path=/api/compliance/**
        - id: core
          uri: http://${CORE_HOST:localhost}:8081
          predicates:
            - Path=/api/**
          filters:
            - name: CircuitBreaker
              args:
                name: core-cb
                fallbackUri: forward:/fallback

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    ng.fixpay: DEBUG
