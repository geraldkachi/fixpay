services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fixpay-postgres
    environment:
      POSTGRES_DB:       fixpay
      POSTGRES_USER:     fixpay
      POSTGRES_PASSWORD: fixpay_dev_secret
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U fixpay -d fixpay"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Valkey (Apache 2.0 Redis drop-in) ───────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: fixpay-valkey
    ports:
      - "6380:6379"
    volumes:
      - valkey_data:/data
    command: >
      valkey-server --save 60 1 --loglevel warning --requirepass valkey_dev_secret
    healthcheck:
      test:     ["CMD", "valkey-cli", "-a", "valkey_dev_secret", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── NATS JetStream (Apache 2.0 messaging) ───────────────────────────────
  nats:
    image: nats:2.14-alpine
    container_name: fixpay-nats
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring HTTP
    command: --jetstream --store_dir /data --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test:     ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── Keycloak 26.6.1 (Apache 2.0 IAM) ────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: fixpay-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB:                       postgres
      KC_DB_URL:                   jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME:              fixpay
      KC_DB_PASSWORD:              fixpay_dev_secret
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin_dev_secret
      KC_HOSTNAME:                 localhost
      KC_HTTP_PORT:                "8180"
      KC_HEALTH_ENABLED:           "true"
      KC_METRICS_ENABLED:          "true"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:         ["CMD-SHELL", "curl -sf http://localhost:8180/health/ready || exit 1"]
      interval:     30s
      timeout:      15s
      retries:      10
      start_period: 90s

  # ─── MailHog (dev SMTP catch-all) ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: fixpay-mailhog
    ports:
      - "1025:1025"   # SMTP — Spring Mail sends here
      - "8025:8025"   # Web UI — open http://localhost:8025 to read emails
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  nats_data:
