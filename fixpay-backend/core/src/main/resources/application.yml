server:
  port: 8081

spring:
  application:
    name: fixpay-core

  datasource:
    url:      jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:fixpay}
    username: ${DB_USER:fixpay}
    password: ${DB_PASSWORD:fixpay_dev_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host:     ${VALKEY_HOST:localhost}
      port:     ${VALKEY_PORT:6380}
      password: ${VALKEY_PASSWORD:valkey_dev_secret}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KC_URL:http://localhost:8180}/realms/${KC_REALM:customers}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

fixpay:
  keycloak:
    url:           ${KC_URL:http://localhost:8180}
    realm:         ${KC_REALM:customers}
    admin-realm:   master
    admin-client:  admin-cli
    admin-user:    ${KC_ADMIN_USER:admin}
    admin-password: ${KC_ADMIN_PASSWORD:admin_dev_secret}
  nats:
    url: ${NATS_URL:nats://localhost:4222}
  events:
    enabled: ${FIXPAY_EVENTS_ENABLED:false}
  verification:
    provider: ${VERIFICATION_PROVIDER:mock}
    report-base-url: ${VERIFICATION_REPORT_BASE_URL:https://reports.fixpay.local/kyc}
    bvn:
      enabled: ${VERIFICATION_BVN_ENABLED:false}
      base-url: ${VERIFICATION_BVN_BASE_URL:https://api.bvn-provider.local}
      api-key: ${VERIFICATION_BVN_API_KEY:}
    nin:
      enabled: ${VERIFICATION_NIN_ENABLED:false}
      base-url: ${VERIFICATION_NIN_BASE_URL:https://api.nin-provider.local}
      api-key: ${VERIFICATION_NIN_API_KEY:}
    cac:
      enabled: ${VERIFICATION_CAC_ENABLED:false}
      base-url: ${VERIFICATION_CAC_BASE_URL:https://api.cac-provider.local}
      api-key: ${VERIFICATION_CAC_API_KEY:}
  vtpass:
    base-url: ${VTPASS_BASE_URL:https://sandbox.vtpass.com}
    api-key: ${VTPASS_API_KEY:}
    secret-key: ${VTPASS_SECRET_KEY:}
    webhook-secret: ${VTPASS_WEBHOOK_SECRET:dev_vtpass_webhook_secret}
  mandate:
    provider: ${MANDATE_PROVIDER:nibss-npsm}
    enabled: ${MANDATE_PROVIDER_ENABLED:false}
    base-url: ${MANDATE_BASE_URL:https://sandbox.nibss.local}
    api-key: ${MANDATE_API_KEY:}
    secret-key: ${MANDATE_SECRET_KEY:}

logging:
  level:
    ng.fixpay: DEBUG
    org.hibernate.SQL: DEBUG
